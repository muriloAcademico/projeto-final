<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokeTracker</title>

    <link rel="stylesheet" href="./css/style.css">
</head>

<body>



    <main class="container">

        <section class="pokedex-wrapper">

            <!-- imagem da pokédex como fundo -->
            <div class="pokedex-bg">

                <!-- área branca onde o pokémon aparece -->
                <div id="pokemonCard"></div>

                <!-- input em cima de "POKÉMON NAME" -->
                <input
                    type="text"
                    id="pokemonInput"
                    placeholder="Digite um Pokémon"
                    class="pokedex-input"
                >

                <!-- botão em cima de "PUT A DESCRIPTION IN HERE" -->
                <button id="buscarBtn" class="pokedex-btn">
                    Buscar
                </button>

            </div>

        </section>

        <section id="timePokemon">

            <h2>Meu Time</h2>

            <div id="listaTime"></div>

        </section>

        <section id="favoritos">

            <h2>Favoritos</h2>

            <div id="listaFavoritos"></div>

        </section>

    </main>

    <script src="./js/api.js"></script>
    <script src="./js/ui.js"></script>
    <script src="./js/favoritos.js"></script>
    <script src="./js/equipe.js"></script>
    <script src="./js/app.js"></script>

</body>

</html>
