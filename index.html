<!DOCTYPE html>
<!--
    index.html - PokeTracker
    Descrição:
      Página principal da aplicação PokeTracker usada para buscar
      Pokémons, exibir informações, e gerenciar o time e a lista de favoritos.

    Estrutura principal:
      - <main class="container">: container principal da interface.
      - <section class="pokedex-wrapper">: área de busca e exibição do Pokémon.
      - #pokemonCard: área onde o card do Pokémon é renderizado dinamicamente.
      - #pokemonInput: campo de busca para o nome do Pokémon.
      - #buscarBtn: botão para iniciar a busca do Pokémon.
      - #timePokemon / #listaTime: seção para exibir o time do usuário.
      - #favoritos / #listaFavoritos: seção para exibir Pokémons favoritos.

    Scripts carregados:
      - js/api.js: chamada à API de Pokémon e tratamento de dados.
      - js/ui.js: construção e atualização dos elementos visuais.
      - js/favoritos.js: lógica de favoritos e persistência local.
      - js/equipe.js: lógica de gerenciamento do time de Pokémons.
      - js/app.js: inicialização do app e registro de eventos.
-->
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokeTracker</title>

    <link rel="stylesheet" href="./css/style.css">
</head>

<body>

    <main class="container">

        <section class="pokedex-wrapper">

            <!-- Imagem da pokédex como fundo -->
            <div class="pokedex-bg">

                <!-- Área branca onde o pokémon aparece -->
                <div id="pokemonCard"></div>

                <!-- Input principal para busca de pokémon, posicionado na Pokédex" -->
                <input
                    type="text"
                    id="pokemonInput"
                    placeholder="Digite um Pokémon"
                    class="pokedex-input"
                >

                <!-- Botão de buscar pokémon, posicionado na Pokédex" -->
                <button id="buscarBtn" class="pokedex-btn">
                    Buscar
                </button>

            </div>

        </section>

        <section id="timePokemon">

            <h2>Meu Time</h2>

            <div id="listaTime"></div>

        </section>

        <section id="favoritos">

            <h2>Favoritos</h2>

            <div id="listaFavoritos"></div>

        </section>

    </main>

    <!-- Scripts do aplicativo: API, interface, favoritos, equipe e inicialização -->
    <script src="./js/api.js"></script>
    <script src="./js/ui.js"></script>
    <script src="./js/favoritos.js"></script>
    <script src="./js/equipe.js"></script>
    <script src="./js/app.js"></script>

</body>

</html>
